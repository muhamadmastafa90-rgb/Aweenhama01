<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بۆ تاقانەکەم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #0f172a, #020617);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* ستایلی شووشەیی مۆدێرن */
        .glass-box {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .status-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
            min-height: 40px;
            color: #e2e8f0;
            font-weight: 500;
        }

        /* باڕی بارگاویکردن (خەتەکە) */
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 1px;
            display: none; /* سەرەتا شاردراوەتەوە تا کلیل دەکات */
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            box-shadow: 0 0 15px #a855f7;
            border-radius: 999px;
        }

        .start-btn {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 999px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        /* بەشی نامە و وێنەکە */
        .hidden {
            display: none !important;
        }

        .letter-box {
            border-color: rgba(236, 72, 153, 0.3);
            box-shadow: 0 0 40px rgba(236, 72, 153, 0.15);
            animation: fadeIn 0.8s ease-out;
        }

        .message-image {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ec4899;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.3);
        }

        .letter-content {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 20px;
            text-align: justify;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .main-text {
            font-size: 16px;
            line-height: 2;
            color: #cbd5e1;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes textAppear {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <audio id="search-music" src="search.mp3" loop></audio>
    <audio id="message-music" src="music.mp3" loop></audio>

    <div id="search-screen" class="container">
        <div class="glass-box">
            <p id="status" class="status-text">تکایە دەست بنێ بە شاشەکەدا... 🔒</p>
            
            <div id="bar-container" class="progress-bar-container">
                <div id="progress" class="progress-bar"></div>
            </div>

            <button id="start-btn" class="start-btn" onclick="startProcess()">کلیک بکە</button>
        </div>
    </div>

    <div id="letter-screen" class="container hidden">
        <div class="glass-box letter-box">
            <img src="image.jpg" alt="Panda" class="message-image">
            
            <div class="letter-content">
                <p class="main-text">ببوورە ئەم دووسێ ڕۆژە لێت تووڕە بوومە،</p>
                <p class="main-text">ئینجا یەک داواکاریم لێت هەبوو هیوادام جێبەجێی بکەی،</p>
                <p class="main-text">من تۆم خۆشەوێ جوان بیت یان ناشرین فەرقی نییە من ئاشقی تۆم،</p>
                <p class="main-text">هیوادارم وازی لەو شتە بێنی...</p>
            </div>
        </div>
    </div>

    <script>
        const searchScreen = document.getElementById('search-screen');
        const letterScreen = document.getElementById('letter-screen');
        const progressBar = document.getElementById('progress');
        const barContainer = document.getElementById('bar-container');
        const statusText = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        
        const searchMusic = document.getElementById('search-music');
        const messageMusic = document.getElementById('message-music');
        const mainTexts = document.querySelectorAll('.main-text');

        let cycleCount = 0;

        function startProcess() {
            startBtn.style.display = 'none';
            barContainer.style.display = 'block';
            searchMusic.play().catch(e => console.log("مۆسیقای یەکەم لێنەدرا"));
            runProgressCycle();
        }

        function runProgressCycle() {
            if (cycleCount >= 4) {
                // دوای ٤ جار پڕبوونەوە، دەچێتە سەر نامەکە
                goToLetterScreen();
                return;
            }

            cycleCount++;
            let width = 0;
            progressBar.style.width = '0%';
            
            // نیشاندانی دەقی گەردوونم
            statusText.innerText = `گەردوونم... (${cycleCount}/4)`;

            // جوڵاندنی خەتەکە
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    // کەمێک چاوەڕوانی پێش دەستپێکردنەوەی خولی داهاتوو
                    setTimeout(() => {
                        runProgressCycle();
                    }, 400);
                } else {
                    width += 2; // لێرەوە خێرایی خەتەکە دیاری دەکرێت
                    progressBar.style.width = width + '%';
                }
            }, 30); 
        }

        function goToLetterScreen() {
            // وەستاندنی مۆسیقای یەکەم
            searchMusic.pause();
            searchMusic.currentTime = 0;

            // گۆڕینی شاشەکان
            searchScreen.classList.add('hidden');
            letterScreen.classList.remove('hidden');

            // لێدانی مۆسیقای نامەکە
            messageMusic.play().catch(e => console.log("مۆسیقای دووەم لێنەدرا"));

            // دەرخستنی نووسینەکان یەک لە دوای یەک
            mainTexts.forEach((text, index) => {
                setTimeout(() => {
                    text.style.animation = "textAppear 0.8s forwards";
                }, index * 1800); // نێوانی دەرکەوتنی هەر دێڕێک (١.٨ چرکە)
            });
        }
    </script>
</body>
</html>
