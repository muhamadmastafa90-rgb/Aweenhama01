<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بۆ تاقانەکەم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.5s ease-in-out;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* بەشی لۆدینگ */
        #search-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background-color: #010409;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 1;
        }

        .search-container {
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border: 1px solid rgba(139, 148, 158, 0.2);
            border-radius: 12px;
            background-color: #161b22;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        .search-container h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #58a6ff;
        }

        .bar-wrapper {
            height: 30px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        #search-status {
            font-size: 14px;
            color: #8b949e;
        }

        .start-btn {
            background-color: #58a6ff;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(88,166,255,0.3);
        }

        .start-btn:hover {
            transform: scale(1.05);
            background-color: #79c0ff;
        }

        /* بەشی نوسینەکان */
        #message-screen {
            display: none;
            opacity: 0;
            width: 95%;
            max-width: 600px;
            height: 90vh;
            border: 1px solid #161b22;
            border-radius: 20px;
            background-color: #161b22;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            overflow-y: auto;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }

        #message-screen.visible {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .message-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #161b22;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border-image: linear-gradient(to right, #58a6ff, #58ff8a) 1;
        }

        .main-text {
            color: #f0f6fc;
            font-size: 18px;
            line-height: 2;
            text-align: justify;
            opacity: 0;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <!-- دەنگی گەڕان -->
    <audio id="search-music" src="search.mp3" loop></audio>
    <!-- دەنگی نوسینەکان -->
    <audio id="message-music" src="message.mp3" loop></audio>

    <!-- بەشی گەڕان -->
    <div id="search-screen">
        <div class="search-container">
            <h2>گەڕان بۆ ئاشتی</h2>
            <div class="bar-wrapper">
                <p id="search-status">تکایە دەست بنێ بە شاشەکەدا...</p>
            </div>
            <button class="start-btn" onclick="startSearch()">کلیک بکە</button>
        </div>
    </div>

    <!-- بەشی نوسینەکان -->
    <div id="message-screen">
        <!-- ئەم وێنەیە لە سەرەوە دانرا -->
        <img src="image.jpg" alt="Panda and Brown bear" class="message-image">
        
        <!-- ئەم دەقانە بڕگە بڕگە دەردەکەون -->
        <p class="main-text">تکایە ببوورە ئەم دووسێ ڕۆژە لێت تووڕە بوومە،</p>
        <p class="main-text">ئینجا یەک داواکاریم لێت هەبوو هیوادام جێبەجێی بکەی،</p>
        <p class="main-text">من تۆم خۆشەوێ، جوان بیت یان ناشرین،</p>
        <p class="main-text">فەرقی نییە، من ئاشقی تۆم،</p>
        <p class="main-text">هیوادارم وازی لەو شتە بێنی، چونکە بۆ ژیانی پێکەوەبوونمان باش نییە...</p>
    </div>

    <script>
        const searchStatus = document.getElementById('search-status');
        const startBtn = document.querySelector('.start-btn');
        const searchScreen = document.getElementById('search-screen');
        const messageScreen = document.getElementById('message-screen');
        const mainTexts = document.querySelectorAll('.main-text');
        const searchMusic = document.getElementById('search-music');
        const messageMusic = document.getElementById('message-music');

        let times = 0;
        let isSearching = false;

        function startSearch() {
            if (isSearching) return;
            isSearching = true;
            startBtn.style.display = 'none';
            searchStatus.innerText = "گەڕان دەستیپێکرد...";
            searchMusic.play();

            const runCycle = () => {
                let textIndex = 0;
                let text = "گەردوونم";
                let currentText = "";
                
                const typeText = () => {
                    if (textIndex < text.length) {
                        currentText += text.charAt(textIndex);
                        searchStatus.innerText = currentText;
                        textIndex++;
                        setTimeout(typeText, 150); // خێرایی تایپکردن
                    } else {
                        // کاتێک تەواو بوو، ئەم کارە بکە
                        times++;
                        if (times < 4) {
                            setTimeout(() => {
                                searchStatus.innerText = "";
                                currentText = "";
                                textIndex = 0;
                                setTimeout(typeText, 300); // دەستپێکردنەوەی بڕگەی نوێ
                            }, 1000); // کاتی وەستان لە کۆتایی نوسیندا
                        } else {
                            // دوای چوار جار، داخلی نوسینەکان ببە
                            searchMusic.pause();
                            searchMusic.currentTime = 0;
                            searchScreen.style.opacity = 0;
                            setTimeout(() => {
                                searchScreen.style.display = 'none';
                                showMessages();
                            }, 1000);
                        }
                    }
                };
                typeText();
            };
            runCycle();
        }

        function showMessages() {
            messageScreen.style.display = 'flex';
            setTimeout(() => {
                messageScreen.classList.add('visible');
                messageMusic.play();
                
                // دەرخستنی نوسینەکان بڕگە بڕگە
                let textDelay = 0;
                mainTexts.forEach(text => {
                    setTimeout(() => {
                        text.style.animation = "fadeIn 1s forwards";
                    }, textDelay);
                    textDelay += 2000; // کاتی وەستان لە نێوان نوسینەکاندا (2 چرکە)
                });
            }, 100);
        }

    </style>
</body>
</html>
